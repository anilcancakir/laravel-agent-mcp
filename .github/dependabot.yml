# Dependabot config for anilcancakir/laravel-agent-mcp.
#
# Two ecosystems: composer (the package's PHP deps) and github-actions (the
# workflow pins). Minor + patch updates roll up into one weekly grouped PR per
# ecosystem so the queue stays small; majors open their own PR for human review.
#
# This is a LIBRARY with no committed composer.lock, so versioning-strategy is
# increase-if-necessary: Dependabot leaves a constraint alone when its range
# already covers the new release and only widens it when needed, which avoids
# spurious constraint-bump PRs.
version: 2

updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    assignees:
      - anilcancakir
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    groups:
      composer-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # laravel/mcp is pinned to >=0.6 <0.8 and is pre-1.0 with breaking minors;
      # a 0.8+ bump must be a deliberate, tested constraint widen, not an auto-PR.
      - dependency-name: "laravel/mcp"
        versions:
          - ">= 0.8"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    assignees:
      - anilcancakir
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
