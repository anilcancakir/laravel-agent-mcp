name: Dependabot auto-merge

# Auto-approve and enable auto-merge for low-risk Dependabot PRs: any GitHub
# Actions minor/patch bump, and dev-dependency patch bumps. Auto-merge only
# completes once the required "CI Passed" check is green; production composer
# deps and majors still get manual review. Requires the repo settings
# "Allow auto-merge" and "Allow GitHub Actions to approve pull requests".
on:
  pull_request_target:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge low-risk Dependabot PRs
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge for low-risk updates
        if: |
          steps.meta.outputs.package-ecosystem == 'github_actions' &&
          (steps.meta.outputs.update-type == 'version-update:semver-minor' ||
           steps.meta.outputs.update-type == 'version-update:semver-patch') ||
          (steps.meta.outputs.package-ecosystem == 'composer' &&
           steps.meta.outputs.dependency-type == 'direct:development' &&
           steps.meta.outputs.update-type == 'version-update:semver-patch')
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
