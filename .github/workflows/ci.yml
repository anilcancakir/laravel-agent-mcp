name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        laravel: ["11", "12", "13"]
        include:
          - laravel: "11"
            testbench: "^9.0"
          - laravel: "12"
            testbench: "^10.0"
          - laravel: "13"
            testbench: "^11.0"

    name: "PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite3, pdo_sqlite
          coverage: ${{ matrix.php == '8.4' && 'pcov' || 'none' }}

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/contracts:^${{ matrix.laravel }}.0" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Static analysis
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Run tests
        run: ${{ matrix.php == '8.4' && 'vendor/bin/pest --coverage --min=80' || 'vendor/bin/pest' }}

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Verify the test matrix succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more matrix jobs failed."
            exit 1
          fi
          echo "All matrix jobs passed."
