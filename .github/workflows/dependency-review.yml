name: Dependency Review

# Diff dependency changes on every PR into main and fail on a moderate-or-worse
# known vulnerability before it can merge.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Diff CVEs on PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
